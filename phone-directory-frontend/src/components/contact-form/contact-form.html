<div class="form-container">
  <div class="form-header">
    <h2>Kişi Bilgileri</h2>
    <p class="form-subtitle">Yeni kişi eklemek için formu doldurun</p>
    
    <!-- Success/Error Messages -->
    <div *ngIf="successMessage" class="message success-message">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="message error-message">
      {{ errorMessage }}
    </div>
  </div>

  <form (ngSubmit)="onSubmit()" class="contact-form">
    <div class="form-group">
      <label for="name" class="form-label">
        Ad
      </label>
      <input 
        id="name"
        type="text"
        [(ngModel)]="contact.name" 
        name="name" 
        class="form-input"
        placeholder="Örn: Ahmet"
        required />
    </div>

    <div class="form-group">
      <label for="soyad" class="form-label">
        Soyad
      </label>
      <input 
        id="soyad"
        type="text"
        [(ngModel)]="contact.soyad" 
        name="soyad" 
        class="form-input"
        placeholder="Örn: Yılmaz" />
    </div>

    <div class="form-group">
      <label for="phone" class="form-label">
        Telefon Numarası
      </label>
      <input 
        id="phone"
        type="tel"
        [(ngModel)]="contact.phone" 
        name="phone" 
        class="form-input"
        placeholder="Örn: 0532 123 45 67"
        required />
    </div>

    <div class="form-group">
      <label for="email" class="form-label">
        Email Adresi
      </label>
      <input 
        id="email"
        type="email"
        [(ngModel)]="contact.email" 
        name="email" 
        class="form-input"
        placeholder="Örn: ahmet@example.com"
        required />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary" [disabled]="isLoading">
        <span class="btn-text" *ngIf="!isLoading">{{ contact.id === 0 ? 'Kişi Ekle' : 'Güncelle' }}</span>
        <span class="loading-text" *ngIf="isLoading">İşlem yapılıyor...</span>
      </button>
      
      <button type="button" class="btn-secondary" (click)="resetForm()" [disabled]="isLoading">
        Temizle
      </button>
    </div>
  </form>
</div>
