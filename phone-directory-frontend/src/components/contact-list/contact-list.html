<h2>Kişi Listesi</h2>
<table>
  <thead>
    <tr>
      <th>Ad</th>
      <th>Telefon</th>
      <th>Email</th>
      <th>İşlemler</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let contact of contacts">
      <td>{{ contact.name }}</td>
      <td>{{ contact.phone }}</td>
      <td>{{ contact.email }}</td>
      <td>
        <button (click)="deleteContact(contact.id)">Sil</button>
      </td>
    </tr>
  </tbody>
</table>
