<h2>Kişi Formu</h2>
<form (ngSubmit)="onSubmit()">
  <label>Ad</label>
  <input [(ngModel)]="contact.name" name="name" required />

  <label>Telefon</label>
  <input [(ngModel)]="contact.phone" name="phone" required />

  <label>Email</label>
  <input [(ngModel)]="contact.email" name="email" required />

  <button type="submit">
    {{ contact.id === 0 ? 'Ekle' : 'Güncelle' }}
  </button>
</form>
