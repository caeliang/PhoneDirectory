<div class="container">
  <h1>Telefon Rehberi</h1>
  
  <!-- Hata Mesajı -->
  <div *ngIf="errorMessage" class="error-message">
    <p>⚠️ {{errorMessage}}</p>
    <button (click)="loadContacts()" class="btn-retry">Tekrar Dene</button>
  </div>
  
  <!-- Loading Durumu -->
  <div *ngIf="loading" class="loading">
    <p>Yükleniyor...</p>
  </div>
  
  <div class="form-section">
    <h2>Yeni Kişi Ekle</h2>
    <form (ngSubmit)="onSubmit()" class="contact-form">
      <div class="form-group">
        <label for="name">Ad:</label>
        <input 
          id="name"
          [(ngModel)]="contact.name" 
          name="name" 
          placeholder="Ad Soyad" 
          required 
          class="form-control"
          [disabled]="loading"
        />
      </div>
      
      <div class="form-group">
        <label for="phone">Telefon:</label>
        <input 
          id="phone"
          [(ngModel)]="contact.phone" 
          name="phone" 
          placeholder="Telefon Numarası" 
          required 
          class="form-control"
          [disabled]="loading"
        />
      </div>
      
      <div class="form-group">
        <label for="email">Email:</label>
        <input 
          id="email"
          [(ngModel)]="contact.email" 
          name="email" 
          type="email"
          placeholder="Email Adresi" 
          required 
          class="form-control"
          [disabled]="loading"
        />
      </div>
      
      <button type="submit" class="btn-primary" [disabled]="loading">
        {{loading ? 'Ekleniyor...' : 'Kişi Ekle'}}
      </button>
    </form>
  </div>

  <div class="contacts-section">
    <h2>Kişi Listesi ({{contacts.length}} kişi)</h2>
    
    <div *ngIf="contacts.length === 0 && !loading && !errorMessage" class="no-contacts">
      <p>Henüz kişi eklenmemiş.</p>
    </div>
    
    <div *ngIf="contacts.length > 0" class="contacts-grid">
      <div *ngFor="let contact of contacts" class="contact-card">
        <h3>{{contact.name}}</h3>
        <p><strong>Telefon:</strong> {{contact.phone}}</p>
        <p><strong>Email:</strong> {{contact.email}}</p>
        <p *ngIf="contact.id" class="contact-id"><small>ID: {{contact.id}}</small></p>
      </div>
    </div>
  </div>
</div>
